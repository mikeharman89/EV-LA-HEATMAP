name: Update EV/LA Heatmap

on:
  schedule:
    - cron: '0 20 * * *'   # 2:00 PM MDT (UTC-6) — change to '0 21 * * *' in winter (MST, UTC-7)
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60      # Statcast pulls can take a while

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EV/LA heatmap
        run: python3 EV_LA_Heatmap.py --years 2025 2026 --out index.html

      - name: Commit and push report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ev_la_heatmap.html
          git diff --cached --quiet || git commit -m "chore: update EV/LA heatmap $(date +'%Y-%m-%d')"
          git push
